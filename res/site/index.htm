<html>

<head>
    <meta charset="utf-8">
    <title>~~Title~~ - zmush v~~ZMVER~~</title>

    <link rel="stylesheet" href="site.css" />

    <style>
        #authed {
            padding-bottom: 48px;
        }
    </style>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <script src=" https://cdn.jsdelivr.net/npm/js-cookie@3.0.8/dist/js.cookie.min.js "></script>
</head>

<body>

    <br />
    <div id="banner">
        <center>ZMUSH v{ZMVER} is Loading...</center>
    </div>

    <div id="login" style="display:none">
        <input type="text" id="user" placeholder="Username" /><br />
        <input type="password" id="pass" placeholder="Password" /><br />
        <button id="b">Login</button>
    </div>

    <div id="authed" style="display:none">
    </div>

    <div id="inputBar" style="display: none;">
        <div id="commandRow">
            <input type="text" id="cmd" placeholder="Type a command and press Enter" />
            <button type="button" id="codeEditorToggle" aria-label="Open code editor">+</button>
        </div>

        <div id="codeEditor" style="display:none;">
            <div id="codeEditorLinks" style="color:#003049;">
                <b>[</b><a href="#" class="color-green" id="codeEditorSave">save</a><b>]</b>
                <b>[</b><a href="#" class="color-green" id="codeEditorCancel">cancel</a><b>]</b>
            </div>
            <textarea id="codeEditorText" placeholder="Type code here..."></textarea>
        </div>
    </div>

    <script>
        var refreshTimer = null

        function handleResult(res) {
            Z.frameText = res.text
            for (var l of res.logs) {
                if (!l) continue;
                Z.logs.push(l)
                $("#log").append(l + "<br />")
            }
        }

        const Z = {
            alwaysEdit: parseInt("~~CanEditByDefault~~"),
            frameText: null,
            logs: [],

            commands: [],
            commandIdx: -1,

            post(url, data, callback) {
                $.post(url, data instanceof Object ? JSON.stringify(data) : data, (res) => {
                    callback(1, res)
                }).fail((xhr, status, error) => {
                    if (xhr.status == 403) {
                        Cookies.remove("ZSession")
                        location.reload()
                        return
                    }

                    if (xhr.status == 0 && !error) {
                        Cookies.remove("ZSession")
                        location.reload()
                        return
                    }

                    console.error("API Error! Status: " + xhr.status + ", Error: " + error);
                    console.error("Response Text: " + xhr.responseText);

                    callback(0, { status: xhr.status, statusMsg: error, error: xhr.responseText })
                })
            },

            startGame() {
                $("#authed").fadeIn()
                $("#inputBar").fadeIn(() => {
                    Cookies.set("ZInGame", "Yes")
                    Z.frame()
                    $("#cmd").focus()
                });
            },

            setRefreshTimer(clearOnly) {
                if (refreshTimer) clearTimeout(refreshTimer);
                if (clearOnly) return;

                refreshTimer = setTimeout(() => {
                    Z.post("/log", window.sessionId, (suc, res) => {
                        if (suc) {
                            var eles = res.split("\n")
                            for (var i = 0; i < eles.length; i++) {
                                if (!eles[i]) continue;
                                var e = eles[i].trim()
                                if (e != "") {
                                    Z.logs.push(e)
                                    $("#log").append(e + "<br />")
                                }
                            }

                            var removed = false;
                            while (Z.logs.length > 20) {
                                Z.logs.shift()
                                removed = true;
                            }

                            if (removed)
                                $("#log").html(Z.logs.join("<br />") + "<br />")

                        } else {
                            Z.logs.push("API Error:  " + res.error)
                            $("#log").append("API Error:  " + res.error + "<br />")
                        }
                        Z.setRefreshTimer()
                    })

                }, 5000);
            },

            frame(force) {
                Z.setRefreshTimer(true)

                if (!Z.frameText || force) {
                    Z.frameText = null
                    Z.post("/frame", window.sessionId, (suc, res) => {
                        if (suc) {
                            handleResult(res)
                            Z.frame()
                        } else {
                            Z.logs.push("API Error:  " + res.error)
                            $("#log").append("API Error:  " + res.error + "<br />")
                        }
                    })
                } else {
                    var log = $("#log").html()
                    if (!log || log == "undefined") log = ""

                    $("#authed").html(Z.frameText)

                    var newLog = $("#log").html()
                    $("#log").html(log + newLog)

                    Z.setRefreshTimer()
                }
            },

            command(cmd) {
                Z.setRefreshTimer(true)

                Z.commands.push(cmd)
                while (Z.commands.length > 20) Z.commands.shift()
                Z.commandIdx = -1

                if (cmd.toLowerCase() == "clear") {
                    $("#log").html("")
                    Z.logs = []
                    Z.frame(true)
                    $("#cmd").val("").focus()
                    return
                }

                Z.post("/command", { sessionId: window.sessionId, command: cmd }, (suc, res) => {
                    if (suc) {
                        handleResult(res)

                        Z.frame()
                        $("#cmd").val("")
                        $("#cmd").focus()
                    } else {
                        Z.logs.push("API Error:  " + res.error)
                        $("#log").append("API Error:  " + res.error + "<br />")
                    }
                    Z.setRefreshTimer()
                })
            },

            showCodeEditor() {
                $("#codeEditor").fadeIn(() => {
                    $("#codeEditorText").focus()
                })
            },

            hideCodeEditor() {
                $("#codeEditor").fadeOut(() => {
                    $("#cmd").focus()
                })
            }
        }

        window['ZVER'] = "~~ZMVER~~";
        window['sessionId'] = Cookies.get("ZSession")
        window['ZInGame'] = Cookies.get("ZInGame") === "Yes"

        $(() => {
            $(document).on('click', ".action-link", function (e) {
                if (!$(this).attr("data-action")) return

                var targ = $(e.target)
                if (targ.is("#special-output")) return

                e.preventDefault();
                const cmd = $(this).attr("data-action")
                Z.command(cmd);
            });

            $(document).on('click', "#codeEditorToggle", function (e) {
                e.preventDefault()
                if ($("#codeEditor").is(":visible")) {
                    Z.hideCodeEditor()
                } else {
                    Z.showCodeEditor()
                }
            });

            $(document).on('click', "#codeEditorSave, #codeEditorCancel", function (e) {
                e.preventDefault()
                Z.hideCodeEditor()
            });

            if (!ZInGame && sessionId) {
                Z.post("/reauth", sessionId, (suc, res) => {
                    if (suc) {
                        $("#banner").fadeOut(() => {
                            Z.startGame()
                        })
                    } else {
                        $("#banner").fadeOut(() => {
                            $("#login").fadeIn(() => {
                                $("#user").focus()
                            })
                        })
                    }
                })

            } else {
                $("#banner").fadeOut(() => {
                    $("#login").fadeIn()
                })
            }

            $('#pass').keypress(function (e) {
                if (e.keyCode == 13) {
                    $('#b').click()
                    return false
                }
            })

            $('#cmd').on('keydown', function (e) {
                if (e.key === 'Enter' || e.keyCode == 13) {
                    e.preventDefault()
                    const text = $(this).val()
                    Z.command(text);
                    return false
                }

                else if (e.key === 'ArrowUp' || e.keyCode == 38) {
                    e.preventDefault()
                    if (Z.commands.length > 0) {
                        if (Z.commandIdx == -1) Z.commandIdx = Z.commands.length - 1
                        else if (Z.commandIdx > 0) Z.commandIdx--
                        $(this).val(Z.commands[Z.commandIdx])
                    }
                    return false

                } else if (e.key === 'ArrowDown' || e.keyCode == 40) {
                    e.preventDefault()
                    if (Z.commands.length > 0) {
                        if (Z.commandIdx == -1) Z.commandIdx = Z.commands.length - 1
                        else if (Z.commandIdx < Z.commands.length - 1) Z.commandIdx++
                        $(this).val(Z.commands[Z.commandIdx])
                    }
                    return false

                } else if (e.key === 'Escape' || e.keyCode == 27) {
                    e.preventDefault()
                    $(this).val("")
                    Z.commandIdx = -1
                    return false
                }
            })

            $("#user").focus();

            $("#b").click(() => {
                Z.post("/auth", { u: $("#user").val(), p: $("#pass").val() }, (suc, res) => {
                    if (suc) {
                        sessionId = res
                        Cookies.set("ZSession", sessionId, { expires: 7 })

                        $("#login").fadeOut(() => {
                            Z.startGame()
                        })
                    } else {
                        alert(res.error)
                    }
                })

            })
        })
    </script>
</body>

</html>
